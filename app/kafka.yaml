apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/pain22value/truve-k8s-resources.git
    targetRevision: feat/#15
    path: chart/kafka

  destination:
    server: https://kubernetes.default.svc
    namespace: truve-kafka

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
