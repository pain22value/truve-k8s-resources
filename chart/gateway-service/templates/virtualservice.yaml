apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Release.Name }}-gateway-vs
spec:
  hosts:
    - "gateway.truve.site"
  gateways:
    - istio-system/truve-gateway
  http:
    # 1. Auth Service
    - match:
        - uri:
            prefix: "/api/auth"
      route:
        - destination:
            host: auth-service.truve-auth-service.svc.cluster.local
            port:
              number: 8081
    # 2. Payment Service
    - match:
        - uri:
            prefix: "/api/payments"
      route:
        - destination:
            host: payment-service.truve-payment-service.svc.cluster.local
            port:
              number: 8082
    # 3. Queue Service
    - match:
        - uri:
            prefix: "/api/queue"
      route:
        - destination:
            host: queue-service.truve-queue-service.svc.cluster.local
            port:
              number: 8083
    # 4. Ticketing Service
    - match:
        - uri:
            prefix: "/api/ticketing"
      route:
        - destination:
            host: ticketing-service.truve-ticketing-service.svc.cluster.local
            port:
              number: 8084
    # 5. Musical Service
    - match:
        - uri:
            prefix: "/api/musical"
      route:
        - destination:
            host: musical-service.truve-musical-service.svc.cluster.local
            port:
              number: 8085
    # 6. Default (Legacy Gateway - will be removed later)
    - route:
        - destination:
            host: gateway-service
            port:
              number: {{ .Values.service.port }}