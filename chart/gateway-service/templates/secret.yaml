apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-gateway-secrets
  namespace: truve-gateway-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: truve-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-gateway-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/gateway-service