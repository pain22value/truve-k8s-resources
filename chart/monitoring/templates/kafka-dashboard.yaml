apiVersion: v1
kind: ConfigMap
metadata:
  name: truve-kafka-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" # Grafana가 이 라벨을 보고 대시보드로 인식합니다.
annotations:
  k8s-sidecar-target-directory: "/tmp/dashboards/Kafka" # Grafana 내부 저장 경로
data:
  kafka-dashboard.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [
        {
          "gridPos": { "h": 3, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Kafka Brokers",
          "type": "stat",
          "targets": [{ "expr": "kafka_brokers{job=~\"$job\"}", "refId": "A" }],
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] } }
          }
        },
        {
          "gridPos": { "h": 3, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "Total Topics",
          "type": "stat",
          "targets": [{ "expr": "count(kafka_topic_partitions{job=~\"$job\"})", "refId": "A" }]
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 3 },
          "id": 5,
          "title": "Messages In per Second",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (topic) (irate(kafka_topic_partition_current_offset{job=~\"$job\", topic=~\"$topic\"}[5m]))",
              "legendFormat": "In: {{topic}}",
              "refId": "A"
            }
          ],
          "options": { "legend": { "displayMode": "table", "placement": "right" } }
        },
        {
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 3 },
          "id": 6,
          "title": "Consumer Lag (Sum by Group)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (group) (kafka_consumergroup_lag{job=~\"$job\", group=~\"$group\"})",
              "legendFormat": "Lag: {{group}}",
              "refId": "A"
            }
          ],
          "options": { "legend": { "displayMode": "table", "placement": "right" } }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "templating": {
        "list": [
          { "name": "datasource", "query": "prometheus", "refresh": 1, "type": "datasource" },
          { "name": "job", "query": "label_values(kafka_topic_partition_current_offset, job)", "refresh": 1, "type": "query" },
          { "name": "topic", "query": "label_values(kafka_topic_partition_current_offset{job=~\"$job\"}, topic)", "refresh": 1, "type": "query", "multi": true, "includeAll": true },
          { "name": "group", "query": "label_values(kafka_consumergroup_current_offset{job=~\"$job\"}, group)", "refresh": 1, "type": "query", "multi": true, "includeAll": true }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Truve Kafka Dashboard (YAML-Managed)",
      "uid": "truve-kafka-yaml"
    }
