apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-queue-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: queue-service
  template:
    metadata:
      labels:
        app: queue-service
    spec:
      containers:
        - name: queue-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources: 
            requests: 
              cpu: "100m" 
              memory: "256Mi" 
            limits: 
              cpu: "200m" 
              memory: "512Mi"
          ports:
            - containerPort: {{ .Values.service.port }}
          
          env:
            {{- range $key, $value := .Values.config }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}

          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-queue-secrets

          volumeMounts:
            - name: config-volume
              mountPath: /app/config
      volumes:
        - name: config-volume
          configMap:
            name: {{ .Release.Name }}-queue-config