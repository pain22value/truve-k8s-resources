# Kafka StatefulSet 정의
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  clusterIP: None
  ports:
    - name: broker
      port: { { .Values.kafka.port } }
      targetPort: { { .Values.kafka.port } }
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  ports:
    - name: broker
      port: { { .Values.kafka.port } }
      targetPort: { { .Values.kafka.port } }
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-headless
  replicas: { { .Values.replicaCount } }
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      nodeSelector: { { - toYaml .Values.nodeSelector | nindent 8 } }

      tolerations: { { - toYaml .Values.tolerations | nindent 8 } }

      affinity: { { - toYaml .Values.affinity | nindent 8 } }

      containers:
        - name: kafka
          image: { { .Values.kafka.image } }
          imagePullPolicy: IfNotPresent

          ports:
            - name: broker
              containerPort: { { .Values.kafka.port } }

          resources: { { - toYaml .Values.kafka.resources | nindent 12 } }

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            - name: KAFKA_BROKER_ID_COMMAND
              value: "hostname | awk -F'-' '{print $NF}'"

            - name: KAFKA_ZOOKEEPER_CONNECT
              value: 'zookeeper-headless:{{ .Values.zookeeper.port }}'

            - name: KAFKA_LISTENERS
              value: 'PLAINTEXT://0.0.0.0:{{ .Values.kafka.port }}'

            - name: KAFKA_ADVERTISED_LISTENERS
              value: '{{ .Values.kafka.advertisedListeners }}'

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: '{{ .Values.kafka.offsetsTopicReplicationFactor | default 3 | quote }}'

            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: '{{ .Values.kafka.transactionStateLogReplicationFactor | default 3 | quote }}'

            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: '{{ .Values.kafka.transactionStateLogMinIsr | default 2 | quote }}'

            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: '{{ .Values.kafka.groupInitialRebalanceDelayMs | default 0 | quote }}'

            - name: KAFKA_LOG_DIRS
              value: '/var/lib/kafka/data'

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: { { .Values.kafka.persistence.storageClass } }
        resources:
          requests:
            storage: { { .Values.kafka.persistence.size } }
