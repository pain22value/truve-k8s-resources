# Kafka StatefulSet 정의
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: {{ .Values.kafka.port }}
      targetPort: {{ .Values.kafka.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: {{ .Values.kafka.port }}
      targetPort: {{ .Values.kafka.port }}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: kafka
          image: {{ .Values.kafka.image | quote }}
          imagePullPolicy: IfNotPresent

          ports:
            - name: broker
              containerPort: {{ .Values.kafka.port }}

          resources:
{{ toYaml .Values.kafka.resources | nindent 12 }}

          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-headless:{{ .Values.zookeeper.port }}"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:{{ .Values.kafka.port }}"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: {{ .Values.kafka.advertisedListeners | quote }}
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: {{ (.Values.kafka.offsetsTopicReplicationFactor | default 1) | quote }}
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: {{ (.Values.kafka.groupInitialRebalanceDelayMs | default 0) | quote }}
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.kafka.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.kafka.persistence.size | quote }}
