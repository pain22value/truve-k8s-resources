apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          command:
            - bash
            - -c
            - |
              KAFKA_ID=${HOSTNAME##*-}
              export KAFKA_BROKER_ID=$KAFKA_ID
              export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${HOSTNAME}.kafka-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.kafka.port }}
              /etc/confluent/docker/run
          ports:
            - containerPort: {{ .Values.kafka.port }}
              name: kafka
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: {{ range $i, $j := until (int .Values.replicaCount) }}{{ if $i }},{{ end }}zookeeper-{{ $j }}.zookeeper-headless.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.zookeeper.clientPort }}{{ end }}
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "{{ .Values.kafka.replicationFactor }}"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:{{ .Values.kafka.port }}"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.kafka.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.kafka.storage.size }}

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kafka.port }}
      targetPort: {{ .Values.kafka.port }}
      name: kafka
  selector:
    app: kafka

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.kafka.port }}
      targetPort: {{ .Values.kafka.port }}
      name: kafka
  selector:
    app: kafka
