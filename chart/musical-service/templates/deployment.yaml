apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-musical-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: musical-service
  template:
    metadata:
      labels:
        app: musical-service
    spec:
      nodeSelector:
        workload: app

      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "app"
          effect: "NoSchedule"

      initContainers:
        - name: copy-otel-agent
          image: busybox:1.36
          command: ["sh", "-c", "wget https://github.com/open-telemetry/opentelemetry-java-instrumentation/releases/latest/download/opentelemetry-javaagent.jar -O /otel/opentelemetry-javaagent.jar"]
          volumeMounts:
            - name: otel-agent
              mountPath: /otel
      containers:
        - name: musical-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          ports:
            - containerPort: {{ .Values.service.port }}
          
          env:
            {{- range $key, $value := .Values.config }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: "musical-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel/opentelemetry-javaagent.jar"

          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-musical-secrets

          volumeMounts:
            - name: config-volume
              mountPath: /app/config
            - name: otel-agent
              mountPath: /otel
      volumes:
        - name: config-volume
          configMap:
            name: {{ .Release.Name }}-musical-config
        - name: otel-agent
          emptyDir: {}