apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-musical-secrets
  namespace: truve-musical-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: truve-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-musical-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/musical-service