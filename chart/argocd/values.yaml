argo-cd:
  global:
    domain: argocd.truve.site

  server:
    extraArgs:
      - --insecure

    ingress:
      enabled: true
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
        alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:599476212908:certificate/c777a244-2261-47b1-aea0-0f68c9fb5249
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/backend-protocol: HTTP
        alb.ingress.kubernetes.io/success-codes: 200,301,302,307
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/healthcheck-port: "8080"
        alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
        alb.ingress.kubernetes.io/load-balancer-attributes: deletion_protection.enabled=true
      
      hosts:
        - argocd.truve.site
      paths:
        - /
      servicePort: 80

  configs:
    cm:
      admin.enabled: "true"
      url: https://argocd.truve.site

  notifications:
    enabled: true
    notifiers:
      service.slack: |
        token: $slack-token
    
    subscriptions:
      - receiver: C0AKYEYK86Q
        notifiers: [slack]
        triggers: [on-sync-succeeded, on-sync-failed, on-health-degraded]

    triggers:
      trigger.on-sync-failed: |
        - when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
          send: [app-sync-failed]
      trigger.on-sync-succeeded: |
        - when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded']
          send: [app-sync-succeeded]
      trigger.on-health-degraded: |
        - when: app.status.health.status == 'Degraded'
          send: [app-health-degraded]

    templates:
      template.app-sync-succeeded: |
        message: |
          Application {{.app.metadata.name}} has been successfully synced.
        slack:
          attachments: |
            [{
              "title": "{{ .app.metadata.name }}",
              "title_link": "{{ .context.argocd_url }}/applications/{{ .app.metadata.name }}",
              "color": "#18be52",
              "fields": [
                { "title": "Sync Status", "value": "{{ .app.status.sync.status }}", "short": true },
                { "title": "Health Status", "value": "{{ .app.status.health.status }}", "short": true }
              ]
            }]
      template.app-sync-failed: |
        message: |
          Application {{.app.metadata.name}} sync has failed.
        slack:
          attachments: |
            [{
              "title": "{{ .app.metadata.name }}",
              "title_link": "{{ .context.argocd_url }}/applications/{{ .app.metadata.name }}",
              "color": "#E91E63",
              "fields": [
                { "title": "Sync Status", "value": "{{ .app.status.sync.status }}", "short": true },
                { "title": "Health Status", "value": "{{ .app.status.health.status }}", "short": true }
              ]
            }]