apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-payment-secrets
  namespace: truve-payment-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: truve-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-payment-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/payment-service