apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payment-service-secret
  namespace: truve-payment-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: truve-secret-store
    kind: ClusterSecretStore
  target:
    name: payment-service-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: prod/payment-service