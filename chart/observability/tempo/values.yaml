fullnameOverride: tempo

replicas: 1

serviceAccount:
  create: true
  name: tempo

persistence:
  enabled: true
  storageClassName: gp3
  size: 20Gi

service:
  type: ClusterIP

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

nodeSelector:
  workload: monitoring

tolerations:
  - key: workload
    operator: Equal
    value: monitoring
    effect: NoSchedule

tempo:
  reportingEnabled: false
  searchEnabled: true # 검색 기능을 활성화하여 Grafana Explore에서 트레이스를 검색할 수 있게 합니다.

  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

  storage:
    trace:
      backend: s3
      s3:
        bucket: truve-dev-tempo-trace
        region: ap-northeast-2
        # prefix는 선택
        prefix: tempo
      # local:
      #   path: /var/tempo/traces

  server:
    http_listen_port: 3200
