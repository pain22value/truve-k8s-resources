loki:
  replicaCount: 1
  image:
    repository: grafana/loki
    tag: 2.8.2
  
  nodeSelector:
    workload: monitoring
  tolerations:
    - key: workload
      operator: Exists
      effect: NoSchedule

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3

  loki:
    config: |
      auth_enabled: false
      server:
        http_listen_port: 3100
        log_level: info

      common:
        path_prefix: /loki
        replication_factor: 1
        storage:
          s3:
            s3: s3://ap-northeast-2/truve-loki-logs # 생성하신 S3 버킷 이름으로 변경하세요
            region: ap-northeast-2
            s3forcepathstyle: true

      schema_config:
        configs:
          - from: 2023-01-01
            store: tsdb # 최신 TSDB 방식 권장
            object_store: s3
            schema: v12
            index:
              prefix: index_
              period: 24h

      storage_config:
        tsdb_shipper:
          active_index_directory: /loki/index
          cache_location: /loki/index/cache
          shared_store: s3

      limits_config:
        enforce_metric_name: false
        reject_old_samples: true
        reject_old_samples_max_age: 720h
        allow_structured_metadata: true


# 로그 수집기 (Fluent Bit으로 대체함)
promtail:
  enabled: false
