mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.96.0

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
      spike_limit_mib: 100
    batch:
      send_batch_size: 1000
      timeout: 10s

  exporters:
    # Jaeger로 Traces 데이터 전송
    otlp/jaeger:
      endpoint: jaeger.observability.svc.cluster.local:4317
      tls:
        insecure: true
    # Prometheus가 긁어갈 수 있도록 메트릭 노출
    prometheus:
      endpoint: "0.0.0.0:8889"
    # 디버깅용 (로그로 데이터 확인 가능)
    logging:
      verbosity: basic

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/jaeger, logging]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheus]

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi

nodeSelector:
  workload: monitoring

tolerations:
  - key: "workload"
    operator: "Exists"
    effect: "NoSchedule"

# Service 설정 추가 (외부/내부 파드가 접근 가능하도록)
ports:
  otlp-grpc:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
