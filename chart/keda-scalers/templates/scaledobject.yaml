{{- range .Values.scaledObjects }}           # values.yaml에 정의된 scaledObjects 리스트를 순회하며 반복 생성
{{- if .enabled }}                          # 해당 객체의 활성화 여부(enabled: true)를 확인
apiVersion: keda.sh/v1alpha1
kind: ScaledObject                          # KEDA의 핵심 리소스인 ScaledObject 정의 시작
metadata:
  name: {{ .name | quote }}                 # 생성될 ScaledObject의 이름
  namespace: {{ .namespace | quote }}       # 대상 리소스가 위치한 네임스페이스
spec:
  scaleTargetRef:                           # 확장의 대상이 되는 리소스 설정
    name: {{ .scaleTargetRef.name | quote }} # Deployment, StatefulSet 등의 이름

  minReplicaCount: {{ .minReplicaCount }}   # 최소 복제본 수 (이벤트가 없어도 유지할 최소 개수)
  maxReplicaCount: {{ .maxReplicaCount }}   # 최대 확장 가능한 복제본 수
  pollingInterval: {{ .pollingInterval }}   # KEDA가 이벤트를 체크하는 주기 (초 단위)
  cooldownPeriod: {{ .cooldownPeriod }}     # 확장이 끝난 후 바로 파드 삭제하지 않고 다시 줄어들기까지 대기하는 시간 (초 단위)

  triggers:                                 # 어떤 조건에서 확장할지 결정하는 트리거 설정
    {{- if eq .type "prometheus" }}         # 1. 프로메테우스(Prometheus) 지표 기반 트리거
    - type: prometheus
      metadata:
        serverAddress: {{ .prometheus.serverAddress | quote }} # 프로메테우스 서버 주소
        metricName: {{ .prometheus.metricName | quote }}       # 조회할 메트릭 이름
        query: {{ .prometheus.query | quote }}                 # 확장을 결정할 PromQL 쿼리문
        threshold: {{ .prometheus.threshold | quote }}         # 복제본을 늘리기 위한 임계치 (기준값)
      {{- if .authenticationRef }}          # 인증 정보가 필요한 경우 (ID/PW 등)
      authenticationRef:
        name: {{ .authenticationRef.name | quote }}
      {{- end }}
    {{- else if eq .type "kafka" }}          # 2. 카프카(Kafka) 메시지 큐 기반 트리거
    - type: kafka
      metadata:
        bootstrapServers: {{ .kafka.bootstrapServers | quote }} # 카프카 브로커 주소
        consumerGroup: {{ .kafka.consumerGroup | quote }}       # 모니터링할 컨슈머 그룹
        topic: {{ .kafka.topic | quote }}                       # 대상 토픽
        lagThreshold: {{ .kafka.lagThreshold | quote }}         # 지연(Lag)이 이 수치를 넘으면 확장함
        offsetResetPolicy: {{ .kafka.offsetResetPolicy | quote }} # 오프셋 리셋 정책
      {{- if .authenticationRef }}          # 카프카 연결 인증 정보 설정
      authenticationRef:
        name: {{ .authenticationRef.name | quote }}
      {{- end }}
    {{- end }}
---
{{- end }}
{{- end }}